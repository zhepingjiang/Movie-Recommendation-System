spring:
  application:
    name: backend
  datasource:
    url: jdbc:postgresql://localhost:5432/movierec
    username: movierec
    password: movierec
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080
