services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: movierec
      POSTGRES_USER: movierec
      POSTGRES_PASSWORD: movierec
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U movierec"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/movierec
      SPRING_DATASOURCE_USERNAME: movierec
      SPRING_DATASOURCE_PASSWORD: movierec
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  recommendation:
    build:
      context: ./recommendation
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
      - recommendation

volumes:
  postgres_data:
